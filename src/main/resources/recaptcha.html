<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>reCAPTCHA Verification</title>
    <script src="https://www.google.com/recaptcha/api.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; background-color: transparent; overflow: hidden; min-height: 100px; }
        .g-recaptcha { transform: scale(0.95); transform-origin: top center; border: 1px solid #eee; }
    </style>
    <script type="text/javascript">
        // Fonction appelée par le reCAPTCHA une fois validé
        function onCaptchaSuccess(token) {
            if (window.jsConnector) {
                try {
                    window.jsConnector.captchaResolved(token);
                    window.__captchaPending = null;
                    return;
                } catch (e) { /* ignore, file d'attente ci-dessous */ }
            }
            window.__captchaPending = token;
        }

        // Fonction appelée en cas d'expiration du captcha
        function onCaptchaExpired() {
            window.__captchaPending = null;
            if (window.jsConnector) {
                try { window.jsConnector.captchaExpired(); } catch (e) { }
            }
        }
    </script>
</head>

<body>
<!-- Le widget reCAPTCHA -->
<div class="g-recaptcha" data-sitekey="6Ld5BrssAAAAAJlHOqETrkQm5mX7A4xHmQwU7Muf" data-callback="onCaptchaSuccess"
     data-expired-callback="onCaptchaExpired">
</div>
</body>

</html>
